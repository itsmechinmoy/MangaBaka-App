# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/mangabaka512.png"
  adaptive_icon_background: "#0a0a0a"
  adaptive_icon_foreground: "assets/mangabaka512.png"
  adaptive_icon_foreground_inset: 30
  min_sdk_android: 21
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/mangabaka512.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/mangabaka512.png"
