name: Build and Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-and-test:
    name: Analyze and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --fatal-warnings --fatal-infos

      - name: Run Tests
        run: flutter test

  build-android:
    name: Build Android
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Set up Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build APK
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename and Prepare Artifact
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)
          cp build/app/outputs/flutter-apk/app-release.apk "android-mangabaka-app-v${VERSION_CLEAN}.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: android-mangabaka-app-v*.apk

  build-windows:
    name: Build Windows
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Package Windows Artifacts
        shell: pwsh
        run: |
          # Extract clean version from pubspec.yaml
          $versionLine = Get-Content pubspec.yaml | Select-String "^version:"
          $versionFull = ($versionLine -split " ")[1].Trim()
          $versionClean = ($versionFull -split "\+")[0]
          echo "VERSION_CLEAN=$versionClean" >> $env:GITHUB_ENV
          
          # Compress the direct runner output (executable and DLLs)
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "windows-mangabaka-app-v${versionClean}.zip"

      - name: Build MSIX Installer
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          try {
              if ($env:WINDOWS_CERTIFICATE_BASE64 -ne $null -and $env:WINDOWS_CERTIFICATE_BASE64 -ne "") {
                  $bytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
                  [System.IO.File]::WriteAllBytes("windows-certificate.pfx", $bytes)
                  dart run msix:create --certificate-path windows-certificate.pfx --certificate-password $env:WINDOWS_CERTIFICATE_PASSWORD
              } else {
                  dart run msix:create
              }
              
              $msixFile = Get-ChildItem -Path build -Filter *.msix -Recurse | Select-Object -First 1
              if ($msixFile) {
                  Copy-Item $msixFile.FullName "windows-mangabaka-app-v${env:VERSION_CLEAN}.msix"
                  Write-Output "Successfully packaged MSIX installer."
              }
          } catch {
              Write-Warning "MSIX packaging failed, zip backup remains primary: $_"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: |
            windows-mangabaka-app-v*.zip
            windows-mangabaka-app-v*.msix

  build-macos:
    name: Build macOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Import macOS Certificates
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Build macOS Application
        run: flutter build macos --release

      - name: Package and Compress App Bundle
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)
          
          # Find the built .app bundle
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1)
          
          # Compress the relative .app bundle directory to keep zip structure clean
          cd "$(dirname "$APP_PATH")"
          zip -r "../../../../macos-mangabaka-app-v${VERSION_CLEAN}.zip" "$(basename "$APP_PATH")"
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: macos-mangabaka-app-v*.zip

  build-ios:
    name: Build iOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Import iOS Certificates
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Build iOS Archive
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$IOS_CERTIFICATE_BASE64" ]; then
            flutter build ipa --release
          else
            flutter build ipa --release --no-codesign
          fi

      - name: Package iOS Artifact
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)
          
          if [ -d "build/ios/ipa" ]; then
            ipa_file=$(find build/ios/ipa -name "*.ipa" | head -n 1)
            if [ -n "$ipa_file" ]; then
              cp "$ipa_file" "ios-mangabaka-app-v${VERSION_CLEAN}.ipa"
              echo "Packaged IPA"
            fi
          else
            xcarchive_path=$(find build/ios/archive -name "*.xcarchive" | head -n 1)
            if [ -n "$xcarchive_path" ]; then
              cd "$(dirname "$xcarchive_path")"
              zip -r "../../../ios-mangabaka-app-v${VERSION_CLEAN}.xcarchive.zip" "$(basename "$xcarchive_path")"
              cd -
              echo "Packaged Unsigned xcarchive zip"
            fi
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: |
            ios-mangabaka-app-v*.ipa
            ios-mangabaka-app-v*.xcarchive.zip

  create-draft-release:
    name: Create Draft Release
    needs: [build-android, build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Release Version
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_ENV

      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use GitHub's native CLI to create the release draft and attach all files
          gh release create "${VERSION_CLEAN}" release-artifacts/* \
            --title "v${VERSION_CLEAN}" \
            --draft \
            --notes "Manual draft release for version ${VERSION_CLEAN} compiled via GitHub Actions."
